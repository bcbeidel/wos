name: Skill Security Audit Report

# High-privilege half of the split-workflow architecture.
#
# Triggered by `workflow_run` after Skill Security Audit Scan completes.
# Checks out the TRUSTED main branch (never the PR head), downloads the
# scan artifact, runs the evaluator + comment-writer (both metadata-only),
# posts the PR comment, and enforces the severity gate via labels.
#
# Because workflow_run only grants write tokens for trusted main commits,
# nothing in the PR's actual code can run here — only the scripts the
# repo owner has approved on `main`.
#
# The `workflow_run.workflows:` value MUST exactly match the scan
# workflow's `name:` — renaming either silently breaks the trigger.

on:
  workflow_run:
    workflows: ["Skill Security Audit Scan"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  report:
    name: Report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e  # v2.10.4
        with:
          egress-policy: audit

      # Check out the TRUSTED default branch — never the PR head.
      - name: Checkout (trusted main)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: main
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'

      - name: Install scanner deps (hash-locked)
        run: |
          set -euo pipefail
          if grep -q '^[a-zA-Z]' .github/scripts/requirements.lock 2>/dev/null; then
            pip install --require-hashes -r .github/scripts/requirements.lock
          else
            pip install -r .github/scripts/requirements.txt
          fi

      - name: Download scan artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: scan-artifacts/
          pattern: scan-*

      - name: Process each plugin's scan
        id: process
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          POLICY_FILE: policy/skill-scan-policy.yml
        run: |
          set -euo pipefail
          overall_gate_ok=1
          head_sha=""
          summary_lines=()

          for artifact_dir in scan-artifacts/*/; do
            [ -d "${artifact_dir}" ] || continue
            ctx="${artifact_dir}context.json"
            findings="${artifact_dir}findings.json"

            if [[ ! -f "${ctx}" || ! -f "${findings}" ]]; then
              echo "::warning::skipping malformed artifact: ${artifact_dir}"
              continue
            fi

            plugin="$(jq -r '.plugin' "${ctx}")"
            pr_number="$(jq -r '.pr_number' "${ctx}")"
            commit_sha="$(jq -r '.commit_sha' "${ctx}")"
            scanner_version="$(jq -r '.scanner_version' "${ctx}")"
            head_sha="${commit_sha}"

            printf '\n── Processing plugin: %s (PR #%s) ──\n' "${plugin}" "${pr_number}"

            mkdir -p "scan-output/${plugin}"

            # 1. Evaluate findings → risk-summary.json
            PLUGIN_NAME="${plugin}" \
            POLICY_FILE="${POLICY_FILE}" \
            SCANNER_VERSION="${scanner_version}" \
            GIT_COMMIT_SHA="${commit_sha}" \
              python .github/scripts/evaluate-findings.py \
                "${findings}" \
                "scan-output/${plugin}/risk-summary.json"

            # 2. Render the PR comment markdown (deterministic; no LLM)
            PLUGIN_NAME="${plugin}" \
              python .github/scripts/write-comment.py \
                "scan-output/${plugin}/risk-summary.json" \
                "scan-output/${plugin}/audit-comment.md"

            # 3. Post (or update) the PR comment
            PR_NUMBER="${pr_number}" \
            COMMENT_FILE="scan-output/${plugin}/audit-comment.md" \
              bash .github/scripts/post-audit-comment.sh

            # 4. Enforce gate per plugin; OR across plugins for the overall result
            severity="$(jq -r '.overall_severity' "scan-output/${plugin}/risk-summary.json")"
            count="$(jq -r '.finding_count' "scan-output/${plugin}/risk-summary.json")"
            if PR_NUMBER="${pr_number}" \
               SUMMARY_FILE="scan-output/${plugin}/risk-summary.json" \
               bash .github/scripts/check-approvals.sh; then
              summary_lines+=("- ✅ \`${plugin}\` — ${severity} (${count} finding(s))")
            else
              echo "gate FAILED for plugin: ${plugin}"
              overall_gate_ok=0
              summary_lines+=("- ❌ \`${plugin}\` — ${severity} (${count} finding(s))")
            fi
          done

          # Persist for the publish-check step. workflow_run jobs do not
          # auto-create PR-level checks; we publish one explicitly below.
          {
            printf 'head_sha=%s\n' "${head_sha}"
            printf 'gate_ok=%s\n' "${overall_gate_ok}"
          } >>"$GITHUB_OUTPUT"
          printf '%s\n' "${summary_lines[@]}" >scan-output/check-summary.md

          if [[ "${overall_gate_ok}" -eq 0 ]]; then
            printf '\none or more plugins failed the severity gate.\n'
            exit 1
          fi

      # Publish the gate decision as a check-run on the PR's head SHA so it
      # appears in `gh pr checks` and can be required in branch protection.
      # workflow_run jobs do not surface as PR checks by default.
      - name: Publish PR-level check
        if: always() && steps.process.outputs.head_sha != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ steps.process.outputs.head_sha }}
          GATE_OK: ${{ steps.process.outputs.gate_ok }}
        run: |
          set -euo pipefail
          if [[ "${GATE_OK}" == "1" ]]; then
            conclusion="success"
            title="Skill security gate passed"
          else
            conclusion="failure"
            title="Skill security gate failed — apply 'security-override' label and re-run to override"
          fi
          summary_body="$(cat scan-output/check-summary.md 2>/dev/null || printf 'No plugin scans processed.\n')"

          jq -n \
            --arg name "Skill Security Audit Report" \
            --arg head_sha "${HEAD_SHA}" \
            --arg conclusion "${conclusion}" \
            --arg title "${title}" \
            --arg summary "${summary_body}" \
            '{name: $name, head_sha: $head_sha, status: "completed", conclusion: $conclusion, output: {title: $title, summary: $summary}}' \
          | gh api "repos/${GITHUB_REPOSITORY}/check-runs" \
              --method POST \
              --input - \
              --silent
          printf 'published check-run: %s on %s\n' "${conclusion}" "${HEAD_SHA}"
