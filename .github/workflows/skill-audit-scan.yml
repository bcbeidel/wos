name: Skill Security Audit Scan

# Low-privilege half of the split-workflow architecture.
#
# Runs against PR head SHA (untrusted contributor code) so it holds the
# minimum possible permissions: contents: read only. The companion
# skill-audit-report.yml is triggered via workflow_run after this one
# completes and handles all write operations against trusted main.
#
# This workflow's name MUST be exactly "Skill Security Audit Scan" — the
# report workflow's workflow_run trigger keys on this string.

on:
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'policy/**'
      - '.github/scripts/**'
      - '.github/workflows/skill-audit-scan.yml'
      - '.github/workflows/skill-audit-report.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  detect-changes:
    name: Detect changed plugins
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      changed_plugins: ${{ steps.detect.outputs.changed_plugins }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e  # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect skill changes
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          bash .github/scripts/detect-skill-changes.sh

  audit:
    name: Scan — ${{ matrix.plugin }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.detect-changes.outputs.changed_plugins) }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e  # v2.10.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'

      - name: Create output directory
        run: |
          set -euo pipefail
          mkdir -p scan-output

      # Reject prohibited binaries/archives BEFORE the LLM scanner.
      # `continue-on-error: true` so the synthetic finding flows through
      # the artifact to the report workflow even when this fails.
      - name: Reject prohibited files
        id: prohibit
        continue-on-error: true
        env:
          PLUGIN: ${{ matrix.plugin }}
        run: |
          set -euo pipefail
          PLUGIN_DIR="plugins/${PLUGIN}" \
          POLICY_FILE="policy/skill-scan-policy.yml" \
          FINDINGS_OUT="scan-output/findings.json" \
            bash .github/scripts/check-prohibited-files.sh

      - name: Install scanner (hash-locked)
        if: steps.prohibit.outcome == 'success'
        run: |
          set -euo pipefail
          if grep -q '^[a-zA-Z]' .github/scripts/requirements.lock 2>/dev/null; then
            pip install --require-hashes -r .github/scripts/requirements.lock
          else
            echo "::warning::requirements.lock empty; falling back to requirements.txt"
            pip install -r .github/scripts/requirements.txt
          fi

      - name: Capture scanner version
        if: steps.prohibit.outcome == 'success'
        id: scanner-version
        run: |
          set -euo pipefail
          version="$(pip show cisco-ai-skill-scanner | awk '/^Version:/ {print $2}')"
          printf 'version=%s\n' "${version}" >>"$GITHUB_OUTPUT"
          printf 'scanner version: %s\n' "${version}"

      # The LLM API key is the ONLY secret in this job. No GITHUB_TOKEN
      # write scope, no deploy creds — a compromised scanner cannot escalate.
      # Gated to same-repo PRs: GitHub strips secrets from fork PRs anyway,
      # but the explicit gate documents the contract.
      - name: Run skill-scanner
        if: |
          steps.prohibit.outcome == 'success'
          && github.event.pull_request.head.repo.full_name == github.repository
        id: scan
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SKILL_SCANNER_LLM_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SKILL_SCANNER_LLM_MODEL: anthropic/claude-opus-4-6
          PLUGIN: ${{ matrix.plugin }}
        run: |
          set -euo pipefail
          skill-scanner scan-all \
            "plugins/${PLUGIN}" \
            --recursive \
            --use-llm \
            --format json \
            --output scan-output/findings.json \
            --fail-on-severity high

      # Persist context the report workflow needs (PR number, head SHA,
      # plugin name, scanner version). The report job has no checkout of
      # the PR head — it gets all PR-specific context from this artifact.
      - name: Write scan context
        if: always()
        env:
          PLUGIN: ${{ matrix.plugin }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          SCANNER_VERSION: ${{ steps.scanner-version.outputs.version }}
          PROHIBIT_OUTCOME: ${{ steps.prohibit.outcome }}
          SCAN_OUTCOME: ${{ steps.scan.outcome }}
        run: |
          set -euo pipefail
          cat >scan-output/context.json <<EOF
          {
            "plugin": "${PLUGIN}",
            "pr_number": "${PR_NUMBER}",
            "commit_sha": "${HEAD_SHA}",
            "scanner-version": "${SCANNER_VERSION:-unknown}",
            "prohibit_outcome": "${PROHIBIT_OUTCOME}",
            "scan_outcome": "${SCAN_OUTCOME}"
          }
          EOF
          # If neither step produced findings.json, write a scan_failed
          # marker so the report job does not silently treat "missing file"
          # as "no findings".
          if [[ ! -f scan-output/findings.json ]]; then
            printf '%s\n' '{"findings": [], "scan_failed": true, "skip_reason": "scan_did_not_produce_output"}' \
              >scan-output/findings.json
          fi

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: scan-${{ matrix.plugin }}
          path: scan-output/
          retention-days: 30
          if-no-files-found: error
